<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shorts Blocker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      padding: 24px;
      transition: background 0.6s ease;
    }

    body.active { background: #0a1628; }

    .card {
      background: #1a1a2e;
      border-radius: 32px;
      padding: 40px 28px;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .app-title {
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
    }

    /* Power Button */
    .power-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 2px solid transparent;
      pointer-events: none;
    }

    body.active .ring {
      animation: pulse 2s infinite;
      border-color: #4ade8033;
    }

    @keyframes pulse {
      0%   { transform: scale(1);   opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .power-btn {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: radial-gradient(circle at 40% 35%, #2a2a3e, #111122);
      box-shadow: 0 0 0 12px #16162a, 0 0 0 14px #1e1e35, 0 8px 32px rgba(0,0,0,0.6);
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .power-btn::before {
      content: '';
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #ef4444;
      border-right-color: #ef4444;
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    body.active .power-btn::before {
      border-top-color: #4ade80;
      border-right-color: #4ade80;
      box-shadow: 0 0 20px #4ade8066;
    }

    body.active .power-btn {
      box-shadow: 0 0 0 12px #16162a, 0 0 0 14px #1e1e35, 0 0 40px #4ade8044, 0 8px 32px rgba(0,0,0,0.6);
    }

    .power-btn:active { transform: scale(0.95); }

    .power-icon {
      width: 48px;
      height: 48px;
      stroke: #ef4444;
      transition: stroke 0.4s, filter 0.4s;
    }

    body.active .power-icon {
      stroke: #4ade80;
      filter: drop-shadow(0 0 8px #4ade80);
    }

    .status-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #ef4444;
      transition: color 0.4s;
    }

    body.active .status-text { color: #4ade80; }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: #2a2a3e;
    }

    /* Platform rows */
    .platforms { width: 100%; display: flex; flex-direction: column; gap: 12px; }

    .platform-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111122;
      border: 1px solid #2a2a3e;
      border-radius: 16px;
      padding: 14px 18px;
      transition: border-color 0.3s;
    }

    .platform-row.on { border-color: #4ade8044; }

    .platform-info { display: flex; align-items: center; gap: 12px; }

    .platform-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .platform-name { font-size: 14px; font-weight: 600; color: #ccc; }
    .platform-sub  { font-size: 11px; color: #555; margin-top: 2px; }

    .platform-row.on .platform-name { color: #fff; }
    .platform-row.on .platform-sub  { color: #4ade8077; }

    /* Toggle switch */
    .switch { position: relative; width: 46px; height: 26px; }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #2a2a3e;
      border-radius: 26px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      left: 3px;
      top: 3px;
      background: #555;
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
    }

    .switch input:checked + .slider { background: #166534; }
    .switch input:checked + .slider::before { transform: translateX(20px); background: #4ade80; }

    /* Copy button */
    .copy-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: #16162a;
      color: #666;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid #2a2a3e;
      transition: all 0.3s;
      letter-spacing: 0.5px;
    }

    body.active .copy-btn {
      background: #0d2818;
      border-color: #4ade8044;
      color: #4ade80;
    }

    .copy-btn:active { transform: scale(0.98); }

    /* About section */
    .about {
      width: 100%;
      background: #111122;
      border: 1px solid #2a2a3e;
      border-radius: 16px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e3a5f, #166534);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .about-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .about-origin {
      font-size: 11px;
      color: #555;
      margin-top: 3px;
    }

    .about-origin span {
      color: #4ade8077;
    }
  </style>
</head>
<body>

  <div class="card">
    <span class="app-title">Shorts Blocker</span>

    <div class="power-wrap">
      <div class="ring"></div>
      <button class="power-btn" onclick="masterToggle()">
        <svg class="power-icon" viewBox="0 0 24 24" fill="none" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v6"/>
          <path d="M6.3 6.3a8 8 0 1 0 11.4 0"/>
        </svg>
      </button>
    </div>

    <span class="status-text" id="statusText">DISABLED</span>

    <div class="divider"></div>

    <div class="platforms">

      <!-- YouTube -->
      <div class="platform-row" id="row-yt">
        <div class="platform-info">
          <div class="platform-icon" style="background:#1a0000;">▶️</div>
          <div>
            <div class="platform-name">YouTube</div>
            <div class="platform-sub">Hides Shorts shelf &amp; tab</div>
          </div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-yt" onchange="platformToggle('yt')" />
          <span class="slider"></span>
        </label>
      </div>

      <!-- Instagram -->
      <div class="platform-row" id="row-ig">
        <div class="platform-info">
          <div class="platform-icon" style="background:#1a001a;">📸</div>
          <div>
            <div class="platform-name">Instagram</div>
            <div class="platform-sub">Hides Reels tab &amp; feed cards</div>
          </div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-ig" onchange="platformToggle('ig')" />
          <span class="slider"></span>
        </label>
      </div>

      <!-- TikTok -->
      <div class="platform-row" id="row-tt">
        <div class="platform-info">
          <div class="platform-icon" style="background:#001a1a;">🎵</div>
          <div>
            <div class="platform-name">TikTok</div>
            <div class="platform-sub">Redirects away from feed</div>
          </div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-tt" onchange="platformToggle('tt')" />
          <span class="slider"></span>
        </label>
      </div>

    </div>

    <button class="copy-btn" onclick="copyScripts()">📋 Copy Scripts for Browser</button>

    <div class="divider"></div>

    <!-- About -->
    <div class="about">
      <div class="avatar">👤</div>
      <div>
        <div class="about-name">EDISON</div>
        <div class="about-origin">📍 <span>Ballia, U.P — India</span></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
